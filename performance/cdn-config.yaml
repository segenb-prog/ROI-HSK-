apiVersion: v1
kind: ConfigMap
metadata:
  name: cdn-config
  namespace: hsk-verifier
data:
  cloudflare.yaml: |
    # Cloudflare CDN Configuration
    
    zones:
      - name: hskernel.io
        id: ${CLOUDFLARE_ZONE_ID}
    
    caching:
      # Static assets
      static_assets:
        patterns:
          - "*.js"
          - "*.css"
          - "*.png"
          - "*.jpg"
          - "*.svg"
          - "*.woff2"
        
        ttl: 86400  # 24 hours
        
        headers:
          Cache-Control: "public, max-age=86400, immutable"
      
      # API responses
      api_cache:
        enabled: true
        
        patterns:
          - "/api/v1/certificates/*"
          - "/api/v1/transparency/*"
        
        ttl: 300  # 5 minutes
        
        vary_by:
          - Accept-Encoding
          - Authorization
      
      # Dynamic content (no cache)
      dynamic_content:
        patterns:
          - "/api/v1/challenge"
          - "/api/v1/response"
          - "/api/v1/consent/grant"
          - "/api/v1/consent/revoke"
        
        cache_level: bypass
    
    # Page rules
    page_rules:
      - name: "API Rate Limiting"
        url: "api.hskernel.io/*"
        actions:
          security_level: high
          browser_check: on
          challenge_ttl: 3600
      
      - name: "Static Assets Cache"
        url: "*hskernel.io/static/*"
        actions:
          cache_level: cache_everything
          edge_cache_ttl: 86400
          browser_cache_ttl: 86400
      
      - name: "Documentation Cache"
        url: "docs.hskernel.io/*"
        actions:
          cache_level: cache_everything
          edge_cache_ttl: 3600
          browser_cache_ttl: 3600
    
    # DDoS protection
    ddos:
      mode: high
      
      challenge_passage_ttl: 86400
      
      sensitivity:
        - path: "/api/*"
          level: high
        
        - path: "/health"
          level: low
    
    # WAF rules
    waf:
      enabled: true
      
      rulesets:
        - name: "OWASP Core Ruleset"
          mode: block
        
        - name: "Cloudflare Managed Rules"
          mode: block
      
      custom_rules:
        - name: "Block SQL Injection"
          expression: "(http.request.uri.query contains \"union\") or (http.request.uri.query contains \"select\")"
          action: block
        
        - name: "Rate Limit API"
          expression: "http.request.uri.path contains \"/api/\""
          action: rate_limit
          rate_limit:
            requests: 100
            period: 60
    
    # SSL/TLS
    ssl:
      mode: strict
      
      min_tls_version: "1.2"
      
      cipher_suites:
        - ECDHE-ECDSA-AES128-GCM-SHA256
        - ECDHE-RSA-AES128-GCM-SHA256
        - ECDHE-ECDSA-AES256-GCM-SHA384
        - ECDHE-RSA-AES256-GCM-SHA384
      
      hsts:
        enabled: true
        max_age: 31536000
        include_subdomains: true
        preload: true
    
    # Argo Smart Routing
    argo:
      enabled: true
      
      tiered_caching: true
      smart_routing: true
    
    # Load balancing
    load_balancing:
      enabled: true
      
      pools:
        - name: "api-pool"
          origins:
            - name: "us-east"
              address: "api-us-east.hskernel.io"
              weight: 100
            - name: "eu-west"
              address: "api-eu-west.hskernel.io"
              weight: 100
          
          health_check:
            type: https
            path: /health
            interval: 60
            timeout: 5
            expected_codes: "200"
      
      steering_policy: geo
    
    # Analytics
    analytics:
      enabled: true
      
      log_push:
        enabled: true
        destination: s3://hsk-logs/cloudflare/
      
      metrics:
        - requests
        - bandwidth
        - cache_ratio
        - errors
        - threats
