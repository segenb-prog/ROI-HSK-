apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth-service
  namespace: hsk-verifier
spec:
  replicas: 2
  selector:
    matchLabels:
      app: oauth-service
  template:
    metadata:
      labels:
        app: oauth-service
    spec:
      containers:
      - name: oauth
        image: hskernel/oauth-service:latest
        ports:
        - containerPort: 8080
        env:
        - name: REDIS_URL
          value: "redis://redis:6379"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: database-credentials
              key: url
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: jwt-secret
              key: secret
        - name: GOOGLE_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: oauth-credentials
              key: google-client-id
        - name: GOOGLE_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: oauth-credentials
              key: google-client-secret
        - name: GITHUB_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: oauth-credentials
              key: github-client-id
        - name: GITHUB_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: oauth-credentials
              key: github-client-secret
        - name: APPLE_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: oauth-credentials
              key: apple-client-id
        - name: APPLE_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: oauth-credentials
              key: apple-client-secret
        - name: OIDC_DISCOVERY_URL
          value: "https://accounts.google.com/.well-known/openid-configuration"
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "1000m"
---
apiVersion: v1
kind: Service
metadata:
  name: oauth-service
  namespace: hsk-verifier
spec:
  selector:
    app: oauth-service
  ports:
  - port: 8080
    targetPort: 8080
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: oauth-providers
  namespace: hsk-verifier
data:
  providers.yaml: |
    # OAuth Provider Configuration
    
    providers:
      google:
        name: "Google"
        client_id: ${GOOGLE_CLIENT_ID}
        client_secret: ${GOOGLE_CLIENT_SECRET}
        authorization_endpoint: "https://accounts.google.com/o/oauth2/v2/auth"
        token_endpoint: "https://oauth2.googleapis.com/token"
        userinfo_endpoint: "https://openidconnect.googleapis.com/v1/userinfo"
        scopes:
          - openid
          - email
          - profile
        claims:
          id: sub
          email: email
          name: name
          picture: picture
        allowed_domains:
          - hskernel.io
      
      github:
        name: "GitHub"
        client_id: ${GITHUB_CLIENT_ID}
        client_secret: ${GITHUB_CLIENT_SECRET}
        authorization_endpoint: "https://github.com/login/oauth/authorize"
        token_endpoint: "https://github.com/login/oauth/access_token"
        userinfo_endpoint: "https://api.github.com/user"
        scopes:
          - read:user
          - user:email
        claims:
          id: id
          email: email
          name: name
          username: login
      
      apple:
        name: "Apple"
        client_id: ${APPLE_CLIENT_ID}
        client_secret: ${APPLE_CLIENT_SECRET}
        authorization_endpoint: "https://appleid.apple.com/auth/authorize"
        token_endpoint: "https://appleid.apple.com/auth/token"
        scopes:
          - name
          - email
        claims:
          id: sub
          email: email
          name: name
    
    # OIDC Configuration
    oidc:
      issuer: "https://auth.hskernel.io"
      authorization_endpoint: "https://auth.hskernel.io/oauth/authorize"
      token_endpoint: "https://auth.hskernel.io/oauth/token"
      userinfo_endpoint: "https://auth.hskernel.io/oauth/userinfo"
      jwks_uri: "https://auth.hskernel.io/.well-known/jwks.json"
      scopes_supported:
        - openid
        - profile
        - email
        - hsk:read
        - hsk:write
        - hsk:admin
      response_types_supported:
        - code
        - token
        - id_token
      grant_types_supported:
        - authorization_code
        - client_credentials
        - refresh_token
      token_endpoint_auth_methods_supported:
        - client_secret_basic
        - client_secret_post
        - private_key_jwt
