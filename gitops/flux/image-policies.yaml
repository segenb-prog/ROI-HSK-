# Image policies for automated updates
---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageRepository
metadata:
  name: hsk-verifier
  namespace: flux-system
spec:
  image: ghcr.io/hsk-platform/hsk-verifier
  interval: 1m0s
  secretRef:
    name: ghcr-token
---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImagePolicy
metadata:
  name: hsk-verifier-production
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: hsk-verifier
  policy:
    semver:
      range: ">=1.0.0 <2.0.0"
---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImagePolicy
metadata:
  name: hsk-verifier-staging
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: hsk-verifier
  policy:
    semver:
      range: ">=0.0.0-0"
    # Allow prerelease versions in staging
---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageRepository
metadata:
