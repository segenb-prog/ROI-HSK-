---
# Image update automation configuration
apiVersion: image.toolkit.fluxcd.io/v1beta1
kind: ImageUpdateAutomation
metadata:
  name: hsk-platform-updates
  namespace: flux-system
spec:
  interval: 5m0s
  sourceRef:
    kind: GitRepository
    name: hsk-platform
  git:
    checkout:
      ref:
        branch: main
    commit:
      author:
        name: Flux Bot
        email: flux@hsk.platform
      messageTemplate: |
        Automated image update by Flux
        
        Images:
        {{ range .Updated.Images -}}
        - {{.}}
        {{ end }}
        
        Configuration Changes:
        {{ range .Updated.Objects -}}
        - {{.Kind}}/{{.Name}} in {{.Namespace}}
        {{ end }}
    push:
      branch: flux-image-updates-{{ .AutomationObject }}
  policy:
    semver:
      range: ">=1.0.0"
---
# Automated PR creation for image updates
apiVersion: notification.toolkit.fluxcd.io/v1beta3
kind: Provider
metadata:
  name: github-pr
  namespace: flux-system
spec:
  type: githubdispatch
  address: https://github.com/hsk-platform/ri0-platform
  secretRef:
    name: github-token
---
apiVersion: notification.toolkit.fluxcd.io/v1beta3
kind: Alert
metadata:
  name: image-update-pr
  namespace: flux-system
spec:
  providerRef:
    name: github-pr
  eventSeverity: info
  eventSources:
    - kind: ImageUpdateAutomation
      name: hsk-platform-updates
  inclusionList:
    - ".*update.*"
