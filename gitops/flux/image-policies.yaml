  namespace: flux-system
spec:
  image: ghcr.io/hsk-platform/hsk-deletion-proof
  interval: 1m0s
  secretRef:
    name: ghcr-token
---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImagePolicy
metadata:
  name: hsk-deletion-proof-production
  namespace: flux-system
