apiVersion: apps/v1
kind: Deployment
metadata:
  name: webhook-service
  namespace: hsk-verifier
spec:
  replicas: 3
  selector:
    matchLabels:
      app: webhook-service
  template:
    metadata:
      labels:
        app: webhook-service
    spec:
      containers:
      - name: webhook
        image: hskernel/webhook-service:latest
        ports:
        - containerPort: 8080
        - containerPort: 9090
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: database-credentials
              key: url
        - name: REDIS_URL
          value: "redis://redis:6379"
        - name: KAFKA_BROKERS
          value: "kafka:9092"
        - name: WEBHOOK_SIGNING_SECRET
          valueFrom:
            secretKeyRef:
              name: webhook-secrets
              key: signing-secret
        - name: MAX_RETRIES
          value: "10"
        - name: RETRY_BACKOFF
          value: "exponential"
        - name: DLQ_ENABLED
          value: "true"
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "1000m"
---
apiVersion: v1
kind: Service
metadata:
  name: webhook-service
  namespace: hsk-verifier
spec:
  selector:
    app: webhook-service
  ports:
  - name: http
    port: 8080
    targetPort: 8080
  - name: metrics
    port: 9090
    targetPort: 9090
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: webhook-config
  namespace: hsk-verifier
data:
  config.yaml: |
    # Webhook System Configuration
    
    webhooks:
      # Event types
      events:
        - consent.granted
        - consent.revoked
        - consent.expired
        - identity.created
        - identity.updated
        - identity.deleted
        - verification.completed
        - certificate.issued
        - certificate.revoked
        - gdpr.export.requested
        - gdpr.export.completed
        - gdpr.deletion.requested
        - gdpr.deletion.completed
        - system.alert
        - system.maintenance
      
      # Delivery configuration
      delivery:
        timeout: 30s
        max_retries: 10
        
        retry_policy:
          strategy: exponential_backoff
          initial_interval: 1s
          max_interval: 1h
          multiplier: 2
          max_elapsed_time: 24h
        
        circuit_breaker:
          enabled: true
          failure_threshold: 5
          recovery_timeout: 60s
          half_open_max_calls: 3
      
      # Security
      security:
        signature:
          enabled: true
          algorithm: HMAC-SHA256
          header: X-Webhook-Signature
          version_header: X-Webhook-Signature-Version
        
        verification:
          enabled: true
          require_https: true
          allowed_ips: []
        
        secret_rotation:
          enabled: true
          interval: 90d
      
      # Payload format
      payload:
        version: "1.0"
        include_metadata: true
        
        schema:
          id: string (UUID)
          event: string (event type)
          created_at: ISO 8601 timestamp
          data: object (event-specific data)
      
      # Dead letter queue
      dlq:
        enabled: true
        
        triggers:
          - max_retries_exceeded
          - delivery_timeout
          - invalid_response
        
        retention: 30d
        
        notification:
          enabled: true
          channels:
            - email
            - slack
      
      # Monitoring
      monitoring:
        metrics:
          - webhook_delivered_total
          - webhook_failed_total
          - webhook_retry_total
          - webhook_latency_seconds
          - dlq_messages_total
        
        alerts:
          - name: high_failure_rate
            condition: "rate(webhook_failed_total[5m]) > 0.1"
            severity: warning
          
          - name: dlq_growing
            condition: "dlq_messages_total > 100"
            severity: critical
    
    # Webhook endpoints management
    endpoints:
      registration:
        required_fields:
          - url
          - events
          - secret
        
        optional_fields:
          - description
          - metadata
          - filter
          - retry_policy
      
      validation:
        url:
          - must_be_https
          - must_be_reachable
          - must_respond_to_challenge
        
        events:
          - must_be_valid_event_types
      
      limits:
        max_endpoints_per_user: 10
        max_events_per_endpoint: 100
    
    # Example webhook payload
    example_payload: |
      {
        "id": "evt_1234567890",
        "event": "consent.granted",
        "created_at": "2024-01-01T00:00:00Z",
        "data": {
          "consent_id": "cons_abc123",
          "did": "did:hsk:example",
          "purpose": "Marketing",
          "data_categories": ["email", "name"],
          "granted_at": "2024-01-01T00:00:00Z",
          "expires_at": "2025-01-01T00:00:00Z"
        },
        "metadata": {
          "webhook_id": "whk_def456",
          "delivery_attempt": 1,
          "sent_at": "2024-01-01T00:00:01Z"
        }
      }
    
    # Signature verification example
    signature_verification: |
      import hmac
      import hashlib
      
      def verify_webhook(payload, signature, secret):
          expected = hmac.new(
              secret.encode(),
              payload.encode(),
              hashlib.sha256
          ).hexdigest()
          return hmac.compare_digest(f"sha256={expected}", signature)
