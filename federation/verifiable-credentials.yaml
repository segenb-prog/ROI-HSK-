apiVersion: apps/v1
kind: Deployment
metadata:
  name: vc-service
  namespace: hsk-verifier
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vc-service
  template:
    metadata:
      labels:
        app: vc-service
    spec:
      containers:
      - name: vc
        image: hskernel/vc-service:latest
        ports:
        - containerPort: 8080
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: database-credentials
              key: url
        - name: REDIS_URL
          value: "redis://redis:6379"
        - name: ISSUER_DID
          value: "did:hsk:issuer"
        - name: SIGNING_KEY_ID
          value: "did:hsk:issuer#key-1"
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "1000m"
---
apiVersion: v1
kind: Service
metadata:
  name: vc-service
  namespace: hsk-verifier
spec:
  selector:
    app: vc-service
  ports:
  - port: 8080
    targetPort: 8080
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: vc-config
  namespace: hsk-verifier
data:
  config.yaml: |
    # W3C Verifiable Credentials Configuration
    
    vc:
      version: "1.1"
      
      # Credential types supported
      credential_types:
        - HSKConsentCredential
        - HSKIdentityCredential
        - HSKVerificationCredential
      
      # Proof formats
      proof_formats:
        - Ed25519Signature2020
        - JsonWebSignature2020
      
      # Credential schemas
      schemas:
        HSKConsentCredential:
          context:
            - https://www.w3.org/2018/credentials/v1
            - https://hskernel.org/schemas/consent/v1
          
          type:
            - VerifiableCredential
            - HSKConsentCredential
          
          required:
            - consentId
            - dataSubject
            - dataController
            - purpose
            - legalBasis
            - grantedAt
            - expiresAt
          
          properties:
            consentId:
              type: string
              format: uuid
            
            dataSubject:
              type: object
              properties:
                did:
                  type: string
                  format: did
            
            dataController:
              type: object
              properties:
                did:
                  type: string
                  format: did
                name:
                  type: string
            
            purpose:
              type: string
            
            legalBasis:
              type: string
              enum:
                - consent
                - contract
                - legal_obligation
                - vital_interests
                - public_task
                - legitimate_interests
            
            dataCategories:
              type: array
              items:
                type: string
            
            grantedAt:
              type: string
              format: date-time
            
            expiresAt:
              type: string
              format: date-time
            
            proof:
              type: object
      
      # Issuance
      issuance:
        enabled: true
        
        workflows:
          automatic:
            - HSKVerificationCredential
          
          manual_review:
            - HSKIdentityCredential
        
        expiration:
          default: "1 year"
          max: "5 years"
      
      # Verification
      verification:
        enabled: true
        
        checks:
          - signature_valid
          - not_expired
          - not_revoked
          - issuer_trusted
          - schema_valid
        
        revocation:
          method: "StatusList2021"
          list_url: "https://api.hskernel.io/vc/revocation-list"
      
      # Presentation
      presentation:
        enabled: true
        
        selective_disclosure:
          enabled: true
          algorithms:
            - BBS+
        
        zero_knowledge:
          enabled: true
          protocols:
            - CLSignatures
    
    # OIDC/SIOP Integration
    oidc:
      enabled: true
      
      siop:
        enabled: true
        response_mode: "post"
        
        claims:
          - vp_token
          - id_token
      
      vp_token:
        format: "jwt_vp"
        
        presentation_definition:
          supported: true
          
          query_by_example:
            enabled: true
          
          query_by_filter:
            enabled: true
