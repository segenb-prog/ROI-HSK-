apiVersion: batch/v1
kind: CronJob
metadata:
  name: cross-region-replication
  namespace: hsk-verifier
spec:
  schedule: "*/5 * * * *"  # Every 5 minutes
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: replication-sa
          containers:
          - name: replicator
            image: postgres:15-alpine
            env:
            - name: SOURCE_DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: replication-config
                  key: source-host
            - name: TARGET_DB_HOSTS
              valueFrom:
                configMapKeyRef:
                  name: replication-config
                  key: target-hosts
            - name: REPLICATION_SLOT
              value: "hsk_replication_slot"
            command:
            - /bin/sh
            - -c
            - |
              set -e
              
              echo "Starting cross-region replication at $(date)"
              
              # Create replication slot if not exists
              psql -h $SOURCE_DB_HOST -U replicator -d consent_ledger -c "
                SELECT * FROM pg_create_logical_replication_slot('${REPLICATION_SLOT}', 'pgoutput')
                WHERE NOT EXISTS (
                  SELECT 1 FROM pg_replication_slots WHERE slot_name = '${REPLICATION_SLOT}'
                );
              " || true
              
              # Get pending changes
              psql -h $SOURCE_DB_HOST -U replicator -d consent_ledger -c "
                SELECT * FROM pg_logical_slot_peek_changes('${REPLICATION_SLOT}', NULL, NULL);
              " > /tmp/changes.sql
              
              # Replicate to each target region
              for TARGET in $(echo $TARGET_DB_HOSTS | tr ',' ' '); do
                echo "Replicating to $TARGET..."
                
                # Apply changes
                psql -h $TARGET -U replicator -d consent_ledger < /tmp/changes.sql || true
                
                # Verify replication lag
                LAG=$(psql -h $TARGET -U replicator -d consent_ledger -t -c "
                  SELECT EXTRACT(EPOCH FROM (NOW() - last_replay_timestamp))
                  FROM pg_stat_wal_receiver;
                " | xargs)
                
                if [ -n "$LAG" ] && [ "$LAG" -gt 30 ]; then
                  echo "WARNING: Replication lag to $TARGET is ${LAG}s"
                  
                  # Send alert
                  curl -X POST http://alertmanager:9093/api/v1/alerts \
                    -H "Content-Type: application/json" \
                    -d "[{
                      \"labels\": {
                        \"alertname\": \"ReplicationLagHigh\",
                        \"severity\": \"warning\",
                        \"target\": \"$TARGET\"
                      },
                      \"annotations\": {
                        \"summary\": \"Replication lag is ${LAG}s\",
                        \"description\": \"Cross-region replication lag exceeds 30s\"
                      }
                    }]"
                fi
              done
              
              # Advance replication slot
              psql -h $SOURCE_DB_HOST -U replicator -d consent_ledger -c "
                SELECT pg_logical_slot_get_changes('${REPLICATION_SLOT}', NULL, NULL);
              " > /dev/null
              
              echo "Cross-region replication completed at $(date)"
            resources:
              requests:
                memory: "256Mi"
                cpu: "200m"
              limits:
                memory: "1Gi"
                cpu: "1000m"
          restartPolicy: OnFailure
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: replication-config
  namespace: hsk-verifier
data:
  source-host: "transparency-db-us-east.hsk-verifier.svc.cluster.local"
  target-hosts: "transparency-db-eu-west.hsk-verifier.svc.cluster.local,transparency-db-ap-northeast.hsk-verifier.svc.cluster.local"
  regions: "us-east,eu-west,ap-northeast,ap-southeast"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: failover-config
  namespace: hsk-verifier
data:
  failover.yaml: |
    # Failover configuration for multi-region deployment
    
    primary_region: us-east
    
    failover_regions:
      us-east:
        priority: 1
        health_check_url: "https://api-us-east.hskernel.io/health"
      eu-west:
        priority: 2
        health_check_url: "https://api-eu-west.hskernel.io/health"
      ap-northeast:
        priority: 3
        health_check_url: "https://api-ap-northeast.hskernel.io/health"
      ap-southeast:
        priority: 4
        health_check_url: "https://api-ap-southeast.hskernel.io/health"
    
    health_check:
      interval: 10s
      timeout: 5s
      failure_threshold: 3
      success_threshold: 2
    
    failover:
      automatic: true
      cooldown_period: 300s
      notification_channels:
        - pagerduty
        - slack
        - email
    
    data_residency:
      eu_citizens:
        primary: eu-west
        replica: us-east
      us_citizens:
        primary: us-east
        replica: eu-west
      apac_citizens:
        primary: ap-northeast
        replica: ap-southeast
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: health-check-monitor
  namespace: hsk-verifier
spec:
  schedule: "*/30 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: health-check
            image: curlimages/curl:latest
            command:
            - /bin/sh
            - -c
            - |
              REGIONS="us-east eu-west ap-northeast ap-southeast"
              
              for REGION in $REGIONS; do
                STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
                  "https://api-${REGION}.hskernel.io/health" || echo "000")
                
                if [ "$STATUS" != "200" ]; then
                  echo "ALERT: $REGION is unhealthy (status: $STATUS)"
                  
                  # Trigger failover if primary
                  if [ "$REGION" = "us-east" ]; then
                    echo "Triggering failover from primary region..."
                    curl -X POST http://failover-controller:8080/failover \
                      -H "Content-Type: application/json" \
                      -d '{"from": "us-east", "to": "eu-west", "reason": "health_check_failed"}'
                  fi
                else
                  echo "$REGION is healthy"
                fi
              done
          restartPolicy: OnFailure
