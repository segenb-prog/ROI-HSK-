apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hs-verifier
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rate-limit: "1000"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      add_header X-Frame-Options "SAMEORIGIN" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header X-XSS-Protection "1; mode=block" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;
spec:
  tls:
    - hosts:
        - verifier.hskernel.dev
        - api.hskernel.dev
      secretName: hs-verifier-tls
  rules:
    - host: verifier.hskernel.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: hs-verifier
                port:
                  number: 8080
    - host: api.hskernel.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: hs-verifier
                port:
                  number: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: transparency-log
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rate-limit: "5000"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
    - hosts:
        - log1.hskernel.dev
        - log2.hskernel.dev
        - log3.hskernel.dev
      secretName: transparency-log-tls
  rules:
    - host: log1.hskernel.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: transparency-log-public
                port:
                  number: 443
    - host: log2.hskernel.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: transparency-log-public
                port:
                  number: 443
    - host: log3.hskernel.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: transparency-log-public
                port:
                  number: 443
