apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: hsk-verifier

commonLabels:
  environment: production
  app.kubernetes.io/part-of: hsk-verifier

resources:
  - ../../namespace.yaml
  - ../../configmaps.yaml
  - ../../database.yaml
  - ../../verifier-deployment.yaml
  - ../../transparency-log-deployment.yaml
  - ../../monitoring.yaml
  - ../../network-policies.yaml
  - ../../rbac.yaml

patchesStrategicMerge:
  - verifier-patch.yaml
  - database-patch.yaml
  - ingress-patch.yaml

configMapGenerator:
  - name: hsk-config
    behavior: merge
    literals:
      - ENVIRONMENT=production
      - LOG_LEVEL=info
      - VERIFICATION_TIMEOUT=72

secretGenerator:
  - name: hsk-keyring
    behavior: merge
    files:
      - keyring.json=production-keyring.json

replicas:
  - name: hs-verifier
    count: 5
  - name: transparency-log
    count: 3

images:
  - name: hskernel/hs-verifier
    newTag: v0.1.0
  - name: hskernel/did-server
    newTag: v0.1.0
  - name: hskernel/transparency-log
    newTag: v0.1.0
