apiVersion: flagger.app/v1beta1
kind: Canary
metadata:
  name: hs-verifier
  namespace: hsk-verifier
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: hs-verifier
  autoscalerRef:
    apiVersion: autoscaling/v2
    kind: HorizontalPodAutoscaler
    name: hs-verifier
  service:
    port: 8080
    targetPort: 8080
    gateways:
      - hsk-verifier-gateway
    hosts:
      - verifier.hskernel.dev
  analysis:
    interval: 1m
    threshold: 5
    maxWeight: 50
    stepWeight: 10
    metrics:
      - name: request-success-rate
        thresholdRange:
          min: 99
        interval: 1m
      - name: request-duration
        thresholdRange:
          max: 500
        interval: 1m
    webhooks:
      - name: load-test
        type: pre-rollout
        url: http://flagger-loadtester.hsk-verifier/
        timeout: 30s
        metadata:
          cmd: "hey -z 1m -q 10 -c 2 http://hs-verifier-canary.hsk-verifier:8080/health"
      - name: conformance-test
        type: pre-rollout
        url: http://flagger-loadtester.hsk-verifier/
        timeout: 5m
        metadata:
          type: bash
          cmd: "curl -sf http://hs-verifier-canary.hsk-verifier:8080/challenge -X POST -d '{\"system_id\":\"canary-test\",\"timeout_hours\":1}'"
      - name: promotion-gate
        type: confirm-promotion
        url: http://flagger-loadtester.hsk-verifier/gate/check
        timeout: 10m
      - name: rollback
        type: rollback
        url: http://flagger-loadtester.hsk-verifier/rollback/check
        timeout: 5m
  progressDeadlineSeconds: 600
