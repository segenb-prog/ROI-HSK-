apiVersion: apps/v1
kind: Deployment
metadata:
  name: hs-verifier
  namespace: hsk-verifier
  labels:
    app: hs-verifier
    app.kubernetes.io/name: hs-verifier
    app.kubernetes.io/component: verifier
    app.kubernetes.io/version: "0.1.0"
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: hs-verifier
  template:
    metadata:
      labels:
        app: hs-verifier
        app.kubernetes.io/name: hs-verifier
        app.kubernetes.io/component: verifier
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: hs-verifier
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: verifier
          image: hskernel/hs-verifier:0.1.0
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: RUST_LOG
              value: "info"
            - name: HSK_KEYRING_PATH
              value: "/etc/hsk/keyring.json"
            - name: HSK_SYSTEM_PUBLIC_KEY
              value: "/etc/hsk/system.pub"
            - name: HSK_EMPTY_STATE_ROOT
              valueFrom:
                configMapKeyRef:
                  name: hsk-config
                  key: empty-state-root
            - name: HSK_ALLOWED_ISSUERS
              valueFrom:
                configMapKeyRef:
                  name: hsk-config
                  key: allowed-issuers
          volumeMounts:
            - name: keyring
              mountPath: /etc/hsk
              readOnly: true
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      volumes:
        - name: keyring
          secret:
            secretName: hsk-keyring
            defaultMode: 0400
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - hs-verifier
                topologyKey: kubernetes.io/hostname
---
apiVersion: v1
kind: Service
metadata:
  name: hs-verifier
  namespace: hsk-verifier
  labels:
    app: hs-verifier
    app.kubernetes.io/name: hs-verifier
    app.kubernetes.io/component: verifier
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: hs-verifier
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: hs-verifier
  namespace: hsk-verifier
  labels:
    app.kubernetes.io/name: hs-verifier
    app.kubernetes.io/component: verifier
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hs-verifier
  namespace: hsk-verifier
  labels:
    app: hs-verifier
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
    - hosts:
        - verifier.hskernel.dev
      secretName: hs-verifier-tls
  rules:
    - host: verifier.hskernel.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: hs-verifier
                port:
                  number: 8080
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: hs-verifier
  namespace: hsk-verifier
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: hs-verifier
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
