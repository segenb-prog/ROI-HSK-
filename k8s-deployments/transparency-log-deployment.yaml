apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: transparency-log
  namespace: hsk-verifier
  labels:
    app: transparency-log
    app.kubernetes.io/name: transparency-log
    app.kubernetes.io/component: transparency
    app.kubernetes.io/version: "0.1.0"
spec:
  serviceName: transparency-log
  replicas: 3
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app: transparency-log
  template:
    metadata:
      labels:
        app: transparency-log
        app.kubernetes.io/name: transparency-log
        app.kubernetes.io/component: transparency
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: transparency-log
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: log-server
          image: hskernel/transparency-log:0.1.0
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: gossip
              containerPort: 9090
              protocol: TCP
          env:
            - name: LOG_SERVER_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: RUST_LOG
              value: "info"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: transparency-log-db
                  key: url
            - name: PEER_SERVERS
              value: "transparency-log-0.transparency-log:9090,transparency-log-1.transparency-log:9090,transparency-log-2.transparency-log:9090"
          volumeMounts:
            - name: data
              mountPath: /data
            - name: signing-key
              mountPath: /etc/hsk
              readOnly: true
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: fast-ssd
        resources:
          requests:
            storage: 100Gi
---
apiVersion: v1
kind: Service
metadata:
  name: transparency-log
  namespace: hsk-verifier
  labels:
    app: transparency-log
    app.kubernetes.io/name: transparency-log
    app.kubernetes.io/component: transparency
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - port: 8080
      targetPort: http
      protocol: TCP
      name: http
    - port: 9090
      targetPort: gossip
      protocol: TCP
      name: gossip
  selector:
    app: transparency-log
---
apiVersion: v1
kind: Service
metadata:
  name: transparency-log-public
  namespace: hsk-verifier
  labels:
    app: transparency-log
    app.kubernetes.io/name: transparency-log
    app.kubernetes.io/component: transparency
spec:
  type: LoadBalancer
  ports:
    - port: 443
      targetPort: 8080
      protocol: TCP
      name: https
  selector:
    app: transparency-log
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: transparency-log
  namespace: hsk-verifier
  labels:
    app.kubernetes.io/name: transparency-log
    app.kubernetes.io/component: transparency
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: transparency-log
  namespace: hsk-verifier
  labels:
    app: transparency-log
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rate-limit: "1000"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
    - hosts:
        - log1.hskernel.dev
        - log2.hskernel.dev
        - log3.hskernel.dev
      secretName: transparency-log-tls
  rules:
    - host: log1.hskernel.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: transparency-log-public
                port:
                  number: 443
    - host: log2.hskernel.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: transparency-log-public
                port:
                  number: 443
    - host: log3.hskernel.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: transparency-log-public
                port:
                  number: 443
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: transparency-log
  namespace: hsk-verifier
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: transparency-log
