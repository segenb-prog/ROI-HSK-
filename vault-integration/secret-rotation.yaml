apiVersion: batch/v1
kind: CronJob
metadata:
  name: secret-rotation
  namespace: vault
spec:
  schedule: "0 */6 * * *"  # Every 6 hours
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: vault-rotator
          containers:
          - name: rotator
            image: hashicorp/vault:1.15.0
            env:
            - name: VAULT_ADDR
              value: "https://vault.vault.svc.cluster.local:8200"
            - name: VAULT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: vault-rotator-token
                  key: token
            command:
            - /bin/sh
            - -c
            - |
              set -e
              
              echo "Starting secret rotation at $(date)"
              
              # Rotate transit keys
              echo "Rotating transit encryption keys..."
              
              for KEY in hsk-consent hsk-passport hsk-audit; do
                echo "Rotating key: $KEY"
                vault write -f transit/keys/$KEY/rotate
                
                # Trim old key versions (keep last 3)
                CURRENT_VERSION=$(vault read -format=json transit/keys/$KEY | jq -r '.data.latest_version')
                if [ "$CURRENT_VERSION" -gt 3 ]; then
                  MIN_VERSION=$((CURRENT_VERSION - 2))
                  vault write transit/keys/$KEY/config \
                    min_decryption_version="$MIN_VERSION" \
                    min_encryption_version="$CURRENT_VERSION"
                fi
              done
              
              # Rotate API keys
              echo "Rotating API keys..."
              vault kv patch secret/hsk/app/api-keys \
                transparency-log="$(openssl rand -hex 32)" \
                webhook-signing="$(openssl rand -hex 32)"
              
              # Rotate backup encryption key
              echo "Rotating backup encryption key..."
              vault kv patch secret/hsk/app/encryption \
                backup-key="$(openssl rand -hex 32)"
              
              # Rotate PKI CA (if needed - check expiry)
              CA_EXPIRY=$(vault read -format=json pki/config/urls | jq -r '.data.issuing_certificates' || echo "")
              if [ -z "$CA_EXPIRY" ]; then
                echo "Rotating PKI CA certificate..."
                vault write pki/root/rotate/internal \
                  common_name="HSK Root CA" \
                  ttl=87600h \
                  key_type="ed25519"
              fi
              
              # Update Kubernetes secrets with new values
              echo "Updating Kubernetes secrets..."
              
              # Get new API key
              NEW_API_KEY=$(vault kv get -format=json secret/hsk/app/api-keys | jq -r '.data.data."transparency-log"')
              
              # Update K8s secret
              kubectl create secret generic hsk-api-keys \
                --from-literal=transparency-log="$NEW_API_KEY" \
                --dry-run=client -o yaml | kubectl apply -f -
              
              # Restart deployments to pick up new secrets
              echo "Restarting deployments..."
              kubectl rollout restart deployment/hs-verifier -n hsk-verifier
              kubectl rollout restart deployment/transparency-log -n hsk-verifier
              
              # Send metrics
              curl -X POST http://prometheus-pushgateway:9091/metrics/job/secret-rotation \
                --data-binary "hsk_secret_rotation_completed_total 1"
              
              echo "Secret rotation completed at $(date)"
            resources:
              requests:
                memory: "128Mi"
                cpu: "100m"
              limits:
                memory: "512Mi"
                cpu: "500m"
          restartPolicy: OnFailure
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: certificate-rotation-check
  namespace: vault
spec:
  schedule: "0 0 * * *"  # Daily
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: vault-rotator
          containers:
          - name: cert-check
            image: hashicorp/vault:1.15.0
            env:
            - name: VAULT_ADDR
              value: "https://vault.vault.svc.cluster.local:8200"
            - name: VAULT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: vault-rotator-token
                  key: token
            command:
            - /bin/sh
            - -c
            - |
              set -e
              
              echo "Checking certificate expiry..."
              
              # List all certificates
              CERT_LIST=$(vault list -format=json pki/certs | jq -r '.[]')
              
              for CERT in $CERT_LIST; do
                EXPIRY=$(vault read -format=json pki/cert/$CERT | jq -r '.data.expiration')
                NOW=$(date +%s)
                DAYS_UNTIL_EXPIRY=$(( (EXPIRY - NOW) / 86400 ))
                
                if [ "$DAYS_UNTIL_EXPIRY" -lt 7 ]; then
                  echo "WARNING: Certificate $CERT expires in $DAYS_UNTIL_EXPIRY days!"
                  
                  # Send alert
                  curl -X POST http://alertmanager:9093/api/v1/alerts \
                    -H "Content-Type: application/json" \
                    -d "[{
                      \"labels\": {
                        \"alertname\": \"CertificateExpiringSoon\",
                        \"severity\": \"warning\",
                        \"certificate\": \"$CERT\"
                      },
                      \"annotations\": {
                        \"summary\": \"Certificate expires in $DAYS_UNTIL_EXPIRY days\",
                        \"description\": \"Certificate $CERT needs renewal\"
                      }
                    }]"
                fi
              done
              
              echo "Certificate check completed"
          restartPolicy: OnFailure
