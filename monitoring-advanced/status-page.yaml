apiVersion: apps/v1
kind: Deployment
metadata:
  name: status-page
  namespace: monitoring
spec:
  replicas: 2
  selector:
    matchLabels:
      app: status-page
  template:
    metadata:
      labels:
        app: status-page
    spec:
      containers:
      - name: status-page
        image: hskernel/status-page:latest
        ports:
        - containerPort: 8080
        env:
        - name: REDIS_URL
          value: "redis://redis:6379"
        - name: PROMETHEUS_URL
          value: "http://prometheus:9090"
        - name: STATUS_PAGE_TITLE
          value: "HSK Platform Status"
        - name: STATUS_PAGE_LOGO
          value: "https://hskernel.io/logo.png"
        - name: STATUS_PAGE_FAVICON
          value: "https://hskernel.io/favicon.ico"
        - name: INCIDENT_HISTORY_DAYS
          value: "90"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: status-page
  namespace: monitoring
spec:
  selector:
    app: status-page
  ports:
  - port: 8080
    targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: status-page-ingress
  namespace: monitoring
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - status.hskernel.io
    secretName: status-tls
  rules:
  - host: status.hskernel.io
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: status-page
            port:
              number: 8080
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: status-page-config
  namespace: monitoring
data:
  config.yaml: |
    # Status Page Configuration
    
    page:
      title: "HSK Platform Status"
      description: "Real-time status of HSK Platform services"
      company: "HSK Platform Operator"
      contact_email: "support@hskernel.io"
      contact_phone: "+1-555-HSK-HELP"
      twitter: "@hskplatform"
    
    components:
      - name: "API"
        description: "Core API endpoints"
        group: "Core Services"
        checks:
          - name: "Health Check"
            url: "https://api.hskernel.io/health"
            method: GET
            expected_status: 200
            timeout: 5s
            interval: 30s
      
      - name: "Authentication"
        description: "Login and identity services"
        group: "Core Services"
        checks:
          - name: "Auth Health"
            url: "https://auth.hskernel.io/health"
            method: GET
            expected_status: 200
      
      - name: "Consent Ledger"
        description: "Consent storage and verification"
        group: "Core Services"
        checks:
          - name: "Database Connection"
            query: "up{job='consent-db'}"
            prometheus_url: "http://prometheus:9090"
      
      - name: "Transparency Log"
        description: "Tamper-evident audit log"
        group: "Core Services"
        checks:
          - name: "Log Health"
            url: "https://api.hskernel.io/transparency/health"
            method: GET
      
      - name: "Web Dashboard"
        description: "User interface"
        group: "User Interfaces"
        checks:
          - name: "Dashboard Load"
            url: "https://app.hskernel.io"
            method: GET
            expected_status: 200
      
      - name: "Data Export"
        description: "GDPR data export service"
        group: "Compliance Services"
        checks:
          - name: "Export Health"
            url: "https://export.hskernel.io/health"
            method: GET
      
      - name: "Documentation"
        description: "API documentation"
        group: "Support Services"
        checks:
          - name: "Docs Available"
            url: "https://docs.hskernel.io"
            method: GET
    
    incidents:
      auto_detect: true
      
      severity_levels:
        - name: "Operational"
          color: "#28a745"
          description: "All systems operational"
        
        - name: "Degraded Performance"
          color: "#ffc107"
          description: "Some performance impact"
        
        - name: "Partial Outage"
          color: "#fd7e14"
          description: "Some services unavailable"
        
        - name: "Major Outage"
          color: "#dc3545"
          description: "Critical services down"
        
        - name: "Maintenance"
          color: "#6c757d"
          description: "Scheduled maintenance"
    
    notifications:
      subscribe_enabled: true
      
      channels:
        - type: email
          enabled: true
        
        - type: webhook
          enabled: true
        
        - type: slack
          enabled: true
          webhook: ${SLACK_STATUS_WEBHOOK}
        
        - type: rss
          enabled: true
    
    metrics:
      uptime_calculation: "30 days"
      
      display:
        - name: "API Uptime"
          query: "avg_over_time(up{job='hs-verifier'}[30d]) * 100"
        
        - name: "Response Time (p99)"
          query: "histogram_quantile(0.99, rate(http_request_duration_seconds_bucket[5m]))"
        
        - name: "Error Rate"
          query: "rate(http_requests_total{status=~'5..'}[5m])"
